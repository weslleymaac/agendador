<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendador — Gestão de Agendamentos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <h1 class="logo">Agendador</h1>
        <p class="tagline">Disparo de webhooks agendados</p>
        <button type="button" class="btn btn-primary" id="btn-novo" aria-label="Novo agendamento">
          <span class="btn-icon">+</span>
          Novo agendamento
        </button>
      </div>
    </header>

    <main class="main">
      <section class="filters">
        <div class="filters-inner">
          <label class="filter-group">
            <span class="filter-label">Status</span>
            <select id="filter-status" class="filter-select">
              <option value="">Todos</option>
              <option value="Agendado">Agendado</option>
              <option value="Executado">Executado</option>
              <option value="Cancelado">Cancelado</option>
              <option value="Falhou">Falhou</option>
            </select>
          </label>
          <label class="filter-group">
            <span class="filter-label">Data</span>
            <input type="date" id="filter-data" class="filter-input" />
          </label>
          <label class="filter-group">
            <span class="filter-label">ID</span>
            <input type="text" id="filter-id" class="filter-input" placeholder="Buscar por ID" />
          </label>
          <button type="button" class="btn btn-secondary" id="btn-filtrar">Filtrar</button>
        </div>
      </section>

      <section class="list-section">
        <div class="list-header">
          <h2>Agendamentos</h2>
          <span class="list-count" id="list-count">0 itens</span>
        </div>
        <div class="list-wrap">
          <div id="list-loading" class="list-loading" hidden>Carregando…</div>
          <div id="list-error" class="list-error" hidden></div>
          <div id="list-empty" class="list-empty" hidden>Nenhum agendamento encontrado.</div>
          <table class="table" id="table-agendamentos" hidden>
            <thead>
              <tr>
                <th>Data</th>
                <th>Hora</th>
                <th>Webhook</th>
                <th>Status</th>
                <th>Dados</th>
                <th class="th-actions">Ações</th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div id="modal-overlay" class="modal-overlay" hidden aria-hidden="true">
    <div class="modal" role="dialog" aria-labelledby="modal-title" aria-modal="true">
      <div class="modal-header">
        <h2 id="modal-title">Novo agendamento</h2>
        <button type="button" class="modal-close" id="modal-close" aria-label="Fechar">&times;</button>
      </div>
      <form id="form-agendamento" class="modal-form">
        <input type="hidden" id="form-id" value="" />
        <div class="form-row">
          <label class="form-group">
            <span class="form-label">Data</span>
            <input type="date" id="form-data" name="data" required class="form-input" />
          </label>
          <label class="form-group">
            <span class="form-label">Hora</span>
            <input type="time" id="form-hora" name="hora" required class="form-input" step="1" />
          </label>
        </div>
        <label class="form-group">
          <span class="form-label">URL do webhook</span>
          <input type="url" id="form-webhook" name="webhookUrl" required class="form-input" placeholder="https://..." />
        </label>
        <label class="form-group">
          <span class="form-label">Dados (JSON)</span>
          <textarea id="form-dados" name="dados" class="form-textarea" rows="4" placeholder='{"mensagem": "exemplo"}'></textarea>
          <span class="form-hint">Objeto JSON enviado no POST do webhook.</span>
        </label>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="form-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="form-submit">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
