services:
  app:
    build: .
    container_name: agendador-app
    # No EasyPanel: atribua o domínio a este serviço (app) e defina a porta como 3000
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      REDIS_URL: redis://redis:6379
      APP_TIMEZONE_OFFSET: -3
      CRON_SECRET: ${CRON_SECRET:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s
    restart: unless-stopped

  cron:
    image: alpine:3.19
    container_name: agendador-cron
    environment:
      CRON_SECRET: ${CRON_SECRET:-}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl
        while true; do
          curl -fsS -H "x-cron-secret: $$CRON_SECRET" http://app:3000/api/cron-process-jobs || true
          sleep 60
        done
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: agendador-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
