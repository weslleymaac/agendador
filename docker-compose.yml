# Redis para desenvolvimento local e para rodar o worker (BullMQ)
# Uso: docker compose up -d redis
services:
  redis:
    image: redis:7-alpine
    container_name: agendador-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
